<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스톤에이지 통합 도감</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary: #38bdf8;
            --item-color: #10b981;
            --accent: #f43f5e;
            --text-main: #f1f5f9;
            --text-sub: #94a3b8;
            --elem-지: #22c55e; /* 초록색 */
            --elem-수: #2196f3; /* 파란색 */
            --elem-화: #f44336; /* 빨간색 */
            --elem-풍: #facc15; /* 노란색 */
        }

        body { 
            font-family: 'Pretendard', -apple-system, sans-serif; 
            background-color: var(--bg-color); color: var(--text-main); 
            margin: 0; padding: 20px; line-height: 1.6;
        }

        .container { max-width: 1000px; margin: 0 auto; }

        .nav-tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 25px; }
        .nav-btn { 
            padding: 12px 25px; border-radius: 30px; border: 2px solid #334155; 
            background: transparent; color: var(--text-sub); cursor: pointer; 
            font-weight: bold; transition: 0.3s;
        }
        .nav-btn.active-pet { background: var(--primary); color: #0f172a; border-color: var(--primary); }
        .nav-btn.active-item { background: var(--item-color); color: #0f172a; border-color: var(--item-color); }

        .search-box {
            display: flex; gap: 10px; background: var(--card-bg); padding: 15px; 
            border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); margin-bottom: 30px;
        }
        input#searchInput {
            flex: 1; padding: 12px; border-radius: 10px; border: 2px solid #334155; 
            background: #0f172a; color: white; font-size: 16px; outline: none;
        }

        #resultArea { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
            gap: 20px; 
        }

        .card { 
            background: var(--card-bg); border-radius: 16px; padding: 20px; 
            border: 1px solid #334155; position: relative; transition: 0.3s;
        }
        .card:hover { transform: translateY(-5px); border-color: #475569; }

        .elem-badge {
            display: inline-block; padding: 2px 8px; border-radius: 5px;
            font-size: 0.75rem; font-weight: bold; margin-right: 5px; margin-top: 8px;
        }
        .bg-지 { background-color: var(--elem-지); color: white; }
        .bg-수 { background-color: var(--elem-수); color: white; }
        .bg-화 { background-color: var(--elem-화); color: white; }
        .bg-풍 { background-color: var(--elem-풍); color: #0f172a; }

        /* 스탯 스타일 수정: 4열(한 줄) 배치 */
        .stat-group { margin-top: 15px; padding-top: 10px; border-top: 1px solid #334155; }
        .stat-grid { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); /* 4개 요소를 한 줄에 배치 */
            gap: 5px; 
            text-align: center;
        }
        .stat-val { 
            font-size: 0.8rem; 
            display: flex; 
            flex-direction: column; /* 라벨과 수치를 위아래로 배치 */
            align-items: center;
        }
        .stat-label { color: var(--text-sub); font-size: 0.7rem; margin-bottom: 2px; }
        .stat-num { font-weight: bold; color: #fff; }

        .total-badge {
            position: absolute; top: 20px; right: 20px;
            background: var(--accent); color: white; padding: 3px 8px;
            border-radius: 6px; font-weight: bold; font-size: 0.85rem;
        }
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align:center; color:var(--primary);">StoneAge Database</h1>
    
    <div class="nav-tabs">
        <button id="petBtn" class="nav-btn active-pet" onclick="switchTab('pet')">🐾 페트 검색</button>
        <button id="itemBtn" class="nav-btn" onclick="switchTab('item')">⚔️ 아이템 검색</button>
    </div>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="페트 이름을 입력하세요..." onkeypress="if(event.keyCode==13) doSearch()">
        <button id="mainBtn" onclick="doSearch()" style="padding:12px 20px; border-radius:10px; border:none; cursor:pointer; font-weight:bold; background:var(--primary);">검색</button>
    </div>

    <div id="resultArea"></div>
</div>

<script>
    let currentTab = 'pet';

    // 데이터 소스
    const petData = [
        { "name": "(신)백호", "sub": "영웅의 길", "elem": {"지":7, "수":3}, "total": 5.008, "stats": {"atk":2.229, "def":1.335, "agi":1.443, "hp":10.243}, "init": {"atk":12, "def":7, "agi":7, "hp":56}, "emoji": "🐅" },
        { "name": "SD언딘", "sub": "충전보상", "elem": {"수":1, "화":9}, "total": 5.160, "stats": {"atk":2.34, "def":1.27, "agi":1.55, "hp":10.55}, "init": {"atk":14, "def":6, "agi":9, "hp":56}, "emoji": "🧚‍♀️" },
        { "name": "SD언딘(진)", "sub": "페트진화", "elem": {"화":9, "풍":1}, "total": 5.288, "stats": {"atk":2.429, "def":1.079, "agi":1.77, "hp":10.144}, "init": {"atk":14, "def":6, "agi":10, "hp":60}, "emoji": "🧚‍♀️" },
        { "name": "골드테이노스(환)", "sub": "페트 환생", "elem": {"지":5, "화":5}, "total": 5.429, "stats": {"atk":2.362, "def":1.34, "agi":1.727, "hp":11.709}, "init": {"atk":15, "def":8, "agi":10, "hp":65}, "emoji": "🦖" }
    ];

    const itemData = [
        { "name": "태양의 목걸이", "type": "장신구", "effect": "공격력 +20, 순발력 +10", "desc": "빛나는 태양의 기운이 담긴 목걸이" },
        { "name": "대지의 도끼", "type": "무기", "effect": "공격력 +50, 방어력 -10", "desc": "땅의 무게를 담아 파괴력이 강한 도끼" }
    ];

    function switchTab(tab) {
        currentTab = tab;
        const pBtn = document.getElementById('petBtn');
        const iBtn = document.getElementById('itemBtn');
        const mBtn = document.getElementById('mainBtn');
        const input = document.getElementById('searchInput');

        if(tab === 'pet') {
            pBtn.className = 'nav-btn active-pet';
            iBtn.className = 'nav-btn';
            mBtn.style.background = 'var(--primary)';
            input.placeholder = "페트 이름을 입력하세요...";
        } else {
            pBtn.className = 'nav-btn';
            iBtn.className = 'nav-btn active-item';
            mBtn.style.background = 'var(--item-color)';
            input.placeholder = "아이템 이름을 입력하세요...";
        }
        document.getElementById('resultArea').innerHTML = "";
    }

    function doSearch() {
        const query = document.getElementById('searchInput').value.trim();
        const area = document.getElementById('resultArea');
        area.innerHTML = "";
        if(!query) return;

        if(currentTab === 'pet') {
            const results = petData.filter(p => p.name.includes(query));
            results.forEach(p => {
                let elemHtml = '';
                if(p.elem) {
                    for(const [key, val] of Object.entries(p.elem)) {
                        if(val > 0) elemHtml += `<span class="elem-badge bg-${key}">${key} ${val}</span>`;
                    }
                }

                area.innerHTML += `
                    <div class="card" style="border-left: 5px solid var(--primary)">
                        <div class="total-badge">${p.total}</div>
                        <div style="font-size:1.3rem; font-weight:bold; color:var(--primary);">${p.emoji || '🐾'} ${p.name}</div>
                        <div style="font-size:0.8rem; color:var(--text-sub);">${p.sub}</div>
                        <div>${elemHtml}</div>
                        
                        <!-- 성장률 한 줄 표시 -->
                        <div class="stat-group">
                            <div style="font-size:0.65rem; color:var(--primary); margin-bottom:8px; font-weight:bold;">GROWTH STATS</div>
                            <div class="stat-grid">
                                <div class="stat-val"><span class="stat-label">공</span><span class="stat-num">${p.stats.atk}</span></div>
                                <div class="stat-val"><span class="stat-label">방</span><span class="stat-num">${p.stats.def}</span></div>
                                <div class="stat-val"><span class="stat-label">순</span><span class="stat-num">${p.stats.agi}</span></div>
                                <div class="stat-val"><span class="stat-label">체</span><span class="stat-num">${p.stats.hp}</span></div>
                            </div>
                        </div>

                        <!-- 초기치 한 줄 표시[cite: 1] -->
                        <div class="stat-group">
                            <div style="font-size:0.65rem; color:var(--text-sub); margin-bottom:8px; font-weight:bold;">INITIAL STATS</div>
                            <div class="stat-grid">
                                <div class="stat-val"><span class="stat-label">공</span><span class="stat-num">${p.init?.atk || '-'}</span></div>
                                <div class="stat-val"><span class="stat-label">방</span><span class="stat-num">${p.init?.def || '-'}</span></div>
                                <div class="stat-val"><span class="stat-label">순</span><span class="stat-num">${p.init?.agi || '-'}</span></div>
                                <div class="stat-val"><span class="stat-label">체</span><span class="stat-num">${p.init?.hp || '-'}</span></div>
                            </div>
                        </div>
                    </div>`;
            });
        } else {
            const results = itemData.filter(i => i.name.includes(query));
            results.forEach(i => {
                area.innerHTML += `
                    <div class="card" style="border-left: 5px solid var(--item-color)">
                        <div style="font-size:0.7rem; color:var(--item-color); font-weight:bold;">${i.type}</div>
                        <div style="font-size:1.3rem; font-weight:bold; color:var(--item-color); margin-bottom:10px;">${i.name}</div>
                        <div style="background:#0f172a; padding:10px; border-radius:8px; font-size:0.9rem;">
                            <div style="color:white; margin-bottom:5px;">✨ ${i.effect}</div>
                            <div style="color:var(--text-sub); font-size:0.8rem;">${i.desc}</div>
                        </div>
                    </div>`;
            });
        }
    }
</script>
</body>
</html>
