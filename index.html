<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스톤에이지 통합 도감</title>
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
<div class="container">
	<picture class="main-banner">
	    <source media="(max-width: 768px)" srcset="./images/banner/main_banner_mobile.png">
	    <img src="./images/banner/main_banner_pc.png" alt="StoneAge Database banner">
	</picture>

	<div class="top-actions">
	    <button type="button" class="top-action-btn share-btn" onclick="shareSite()">🔗 링크 공유</button>
	    <button type="button" class="top-action-btn refresh-btn" onclick="refreshSite()">🔄 새로고침</button>
	</div>

    <div class="nav-tabs">
        <button id="petBtn" class="nav-btn active-pet" onclick="switchTab('pet')">🐾 페트 검색</button>
        <button id="itemBtn" class="nav-btn" onclick="switchTab('item')">⚔️ 아이템 검색</button>
        <button id="rankBtn" class="nav-btn" onclick="switchTab('rank')">🏆 펫 랭킹</button>
        <button id="radontaBtn" class="nav-btn" onclick="switchTab('radonta')">🗼 라돈타 공략</button>
        <button id="ridingBtn" class="nav-btn" onclick="switchTab('riding')">🦖 탑승펫 안내</button>
    </div>

    <div id="petSearchPanel" class="search-panel">
        <div class="search-row row-1">
            <div class="search-group">
                <label>페트 네임</label>
                <input type="text" id="pName" placeholder="페트 이름을 입력하세요 (예: 백호, 언딘)">
            </div>
        </div>

        <div class="search-row row-4">
            <div class="search-group">
                <label style="color:var(--elem-지)">지속성 (이상)</label>
                <input type="number" id="eJi" placeholder="예: 7">
            </div>
            <div class="search-group">
                <label style="color:var(--elem-수)">수속성 (이상)</label>
                <input type="number" id="eSu" placeholder="예: 3">
            </div>
            <div class="search-group">
                <label style="color:var(--elem-화)">화속성 (이상)</label>
                <input type="number" id="eHwa" placeholder="예: 0">
            </div>
            <div class="search-group">
                <label style="color:var(--elem-풍)">풍속성 (이상)</label>
                <input type="number" id="ePung" placeholder="예: 0">
            </div>
        </div>

        <div class="search-row row-5">
            <div class="search-group">
                <label>공격 성장(↑)</label>
                <input type="number" id="minAtk" step="0.1" placeholder="2.3">
            </div>
            <div class="search-group">
                <label>방어 성장(↑)</label>
                <input type="number" id="minDef" step="0.1" placeholder="1.3">
            </div>
            <div class="search-group">
                <label>순발 성장(↑)</label>
                <input type="number" id="minAgi" step="0.1" placeholder="1.4">
            </div>
            <div class="search-group">
                <label>체력 성장(↑)</label>
                <input type="number" id="minHp" step="0.1" placeholder="10.0">
            </div>
            <div class="search-group">
                <label>전체 성장(↑)</label>
                <input type="number" id="minTotal" step="0.1" placeholder="5.0">
            </div>
        </div>

        <div class="search-row row-1">
            <div class="search-group">
                <label>정렬 방향</label>
                <select id="pSortOrder">
                    <option value="desc">검색 기준 높은순</option>
                    <option value="asc">검색 기준 낮은순</option>
                </select>
            </div>
        </div>

        <div class="search-actions">
            <button class="btn-reset" onclick="resetSearch()">초기화</button>
            <button class="btn-search" onclick="doSearch()" style="background:var(--primary)">페트 조건 검색</button>
        </div>
    </div>

    <div id="itemSearchPanel" class="search-panel" style="display:none;">
        <div class="search-row row-1">
            <div class="search-group">
                <label>아이템 이름</label>
                <input type="text" id="iName" placeholder="아이템 이름을 입력하세요 (예: 태양, 대지)">
            </div>
        </div>

        <div class="search-row row-1">
            <div class="search-group">
                <label>아이템 종류</label>
                <select id="iType">
                    <option value="">전체보기</option>
                    <option value="무기">무기</option>
                    <option value="방어구">방어구</option>
                    <option value="장신구">장신구</option>
                    <option value="소모품">소모품</option>
                </select>
            </div>
        </div>

        <div class="search-row row-1">
            <div class="search-group">
                <label>효과 키워드</label>
                <input type="text" id="iEffect" placeholder="특정 능력치 효과 (예: 공격력, 순발력, 크리)">
            </div>
        </div>

        <div class="search-actions">
            <button class="btn-reset" onclick="resetSearch()">초기화</button>
            <button class="btn-search" onclick="doSearch()" style="background:var(--item-color)">아이템 검색</button>
        </div>
    </div>

    <div id="rankSearchPanel" class="search-panel" style="display:none;">
        <div class="search-row row-4">
            <div class="search-group">
                <label>페트 이름</label>
                <input type="text" id="rankPetName" placeholder="예: 백호, 레드프라키">
            </div>

            <div class="search-group">
                <label>닉네임</label>
                <input type="text" id="rankNickname" placeholder="예: 정대">
            </div>

            <div class="search-group">
                <label>정렬 기준</label>
                <select id="rankMetric">
                    <option value="combatPower">전투력</option>
                    <option value="level">Lv</option>
                    <option value="atk">공격력</option>
                    <option value="def">방어력</option>
                    <option value="agi">순발력</option>
                    <option value="hp">내구력</option>
                    <option value="rank">원본 순위</option>
                </select>
            </div>

            <div class="search-group">
                <label>표시 개수</label>
                <input type="number" id="rankLimit" value="20" min="1" max="200">
            </div>
        </div>

        <div class="search-actions">
            <button class="btn-reset" onclick="resetSearch()">초기화</button>
            <button class="btn-search" onclick="doSearch()" style="background:var(--rank-color)">랭킹 보기</button>
        </div>
    </div>

    <div id="radontaSearchPanel" class="search-panel" style="display:none;">
        <div class="search-row row-4">
            <div class="search-group">
                <label>층 검색</label>
                <input type="text" id="radontaFloor" placeholder="예: 10, 60, 90, 101">
            </div>

            <div class="search-group">
                <label>셋 필터</label>
                <select id="radontaSet">
                    <option value="">전체</option>
                    <option value="수셋">수셋</option>
                    <option value="지셋">지셋</option>
                </select>
            </div>

            <div class="search-group">
                <label>키워드</label>
                <input type="text" id="radontaKeyword" placeholder="예: 부활, 혼란, 무지개">
            </div>

            <div class="search-group">
                <label>표시</label>
                <select id="radontaViewMode">
                    <option value="all">전체 보기</option>
                    <option value="simple">간단 보기</option>
                </select>
            </div>
        </div>

        <div class="search-actions">
            <button class="btn-reset" onclick="resetSearch()">초기화</button>
            <button class="btn-search" onclick="doSearch()" style="background:var(--radonta-color)">공략 보기</button>
        </div>
    </div>

<div id="ridingSearchPanel" class="search-panel" style="display:none;">
    <div class="search-row row-4">
        <div class="search-group">
            <label>캐릭터 이름</label>
            <input type="text" id="ridingCharacter" placeholder="예: 툰가, 꼬맹이, 울보소녀">
        </div>

        <div class="search-group">
            <label>펫 이름</label>
            <input type="text" id="ridingPetName" placeholder="예: 백호, 디어룬, 현무">
        </div>

        <div class="search-group">
            <label>표시 방식</label>
            <select id="ridingViewMode">
                <option value="all">전체 보기</option>
                <option value="matched">이미지 있는 펫만</option>
                <option value="unmatched">미매칭만</option>
            </select>
        </div>

        <div class="search-group">
            <label>정렬</label>
            <select id="ridingSortMode">
                <option value="character">캐릭터명순</option>
                <option value="count">탑승펫 많은순</option>
            </select>
        </div>
    </div>

    <div class="search-actions">
        <button class="btn-reset" onclick="resetSearch()">초기화</button>
        <button class="btn-search" onclick="doSearch()" style="background:#14b8a6">탑승펫 보기</button>
    </div>
</div>

    <div id="resultArea"></div>
</div>

<script src="./js/app.js" defer></script>
</body>
</html>
