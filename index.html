<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스톤에이지 통합 도감</title>
    <style>
        :root {
            --bg-color: #0f172a; --card-bg: #1e293b; --primary: #38bdf8;
            --item-color: #10b981; --accent: #f43f5e; --text-main: #f1f5f9; --text-sub: #94a3b8;
            --elem-지: #22c55e; --elem-수: #2196f3; --elem-화: #f44336; --elem-풍: #facc15;
        }

        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; }

        /* 탭 버튼 스타일 */
        .nav-tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 25px; }
        .nav-btn { padding: 12px 25px; border-radius: 30px; border: 2px solid #334155; background: transparent; color: var(--text-sub); cursor: pointer; font-weight: bold; transition: 0.3s; }
        .nav-btn.active-pet { background: var(--primary); color: #0f172a; border-color: var(--primary); }
        .nav-btn.active-item { background: var(--item-color); color: #0f172a; border-color: var(--item-color); }

        /* 검색 패널 공통 */
        .search-panel { background: var(--card-bg); padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); margin-bottom: 30px; border: 1px solid #334155; }
        .search-row { display: grid; gap: 15px; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px dashed #334155; }
        .search-row:last-of-type { border-bottom: none; margin-bottom: 10px; }
        
        .row-1 { grid-template-columns: 1fr; }
        .row-4 { grid-template-columns: repeat(4, 1fr); }
        .row-5 { grid-template-columns: repeat(5, 1fr); }

        .search-group { display: flex; flex-direction: column; gap: 8px; }
        .search-group label { font-size: 0.75rem; color: var(--text-sub); font-weight: bold; }
        
        input, select { padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; outline: none; font-size: 14px; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2); }

        .search-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 10px; }
        .btn-search { padding: 12px 50px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; color: #0f172a; }
        .btn-reset { padding: 12px 20px; border-radius: 8px; border: 1px solid #334155; background: transparent; color: var(--text-sub); cursor: pointer; }

        /* 결과 카드 */
        #resultArea { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 20px; }
        .card { background: var(--card-bg); border-radius: 16px; padding: 20px; border: 1px solid #334155; position: relative; transition: 0.3s; }
        
        .stat-section { margin-top: 15px; padding-top: 10px; border-top: 1px solid #334155; }
        .stat-row-label { font-size: 0.7rem; color: var(--primary); margin-bottom: 5px; font-weight: bold; }
        .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; text-align: center; margin-bottom: 10px; }
        .stat-val { font-size: 0.8rem; display: flex; flex-direction: column; background: #0f172a; padding: 5px; border-radius: 5px; }
        .stat-label { color: var(--text-sub); font-size: 0.65rem; }
        .stat-num { font-weight: bold; color: #fff; }

        .total-badge { position: absolute; top: 20px; right: 20px; background: var(--accent); color: white; padding: 3px 8px; border-radius: 6px; font-weight: bold; font-size: 0.85rem; }
        .elem-badge { display: inline-block; padding: 2px 8px; border-radius: 5px; font-size: 0.75rem; font-weight: bold; margin-right: 5px; margin-top: 8px; }
        .bg-지 { background-color: var(--elem-지); color: white; }
        .bg-수 { background-color: var(--elem-수); color: white; }
        .bg-화 { background-color: var(--elem-화); color: white; }
        .bg-풍 { background-color: var(--elem-풍); color: #0f172a; }
                    /* 모바일 화면 대응 */
        @media (max-width: 768px) {
            body {
                padding: 12px;
            }

            .container {
                max-width: 100%;
            }

            .nav-tabs {
                gap: 8px;
            }

            .nav-btn {
                flex: 1;
                padding: 12px 8px;
                font-size: 0.9rem;
            }

            .search-panel {
                padding: 16px;
            }

            /* 모바일에서는 검색 조건을 2칸씩 배치 */
            .row-4,
            .row-5 {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }

            .row-1 {
                grid-template-columns: 1fr;
            }

            /* 전체 성장 입력칸은 혼자 한 줄 전체 사용 */
            .row-5 .search-group:last-child {
                grid-column: span 2;
            }

            input,
            select {
                width: 100%;
                box-sizing: border-box;
            }

            .search-actions {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 10px;
            }

            .btn-search,
            .btn-reset {
                width: 100%;
                padding: 12px 8px;
            }

            #resultArea {
                grid-template-columns: 1fr;
            }

            .stat-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align:center; color:var(--primary); margin-bottom:30px;">StoneAge Database</h1>
    
    <div class="nav-tabs">
        <button id="petBtn" class="nav-btn active-pet" onclick="switchTab('pet')">🐾 페트 검색</button>
        <button id="itemBtn" class="nav-btn" onclick="switchTab('item')">⚔️ 아이템 검색</button>
    </div>

    <!-- 페트 검색 패널 -->
    <div id="petSearchPanel" class="search-panel">
        <div class="search-row row-1">
            <div class="search-group"><label>페트 네임</label><input type="text" id="pName" placeholder="페트 이름을 입력하세요 (예: 백호, 언딘)"></div>
        </div>
        <div class="search-row row-4">
            <div class="search-group"><label style="color:var(--elem-지)">지속성 (이상)</label><input type="number" id="eJi" placeholder="예: 7"></div>
            <div class="search-group"><label style="color:var(--elem-수)">수속성 (이상)</label><input type="number" id="eSu" placeholder="예: 3"></div>
            <div class="search-group"><label style="color:var(--elem-화)">화속성 (이상)</label><input type="number" id="eHwa" placeholder="예: 0"></div>
            <div class="search-group"><label style="color:var(--elem-풍)">풍속성 (이상)</label><input type="number" id="ePung" placeholder="예: 0"></div>
        </div>
        <div class="search-row row-5">
            <div class="search-group"><label>공격 성장(↑)</label><input type="number" id="minAtk" step="0.1" placeholder="2.3"></div>
            <div class="search-group"><label>방어 성장(↑)</label><input type="number" id="minDef" step="0.1" placeholder="1.3"></div>
            <div class="search-group"><label>순발 성장(↑)</label><input type="number" id="minAgi" step="0.1" placeholder="1.4"></div>
            <div class="search-group"><label>체력 성장(↑)</label><input type="number" id="minHp" step="0.1" placeholder="10.0"></div>
            <div class="search-group"><label>전체 성장(↑)</label><input type="number" id="minTotal" step="0.1" placeholder="5.0"></div>
        </div>
        <div class="search-actions">
            <button class="btn-reset" onclick="resetSearch()">초기화</button>
            <button class="btn-search" onclick="doSearch()" style="background:var(--primary)">페트 조건 검색</button>
        </div>
    </div>

    <!-- 아이템 검색 패널 (복구 완료) -->
    <div id="itemSearchPanel" class="search-panel" style="display:none;">
        <div class="search-row row-1">
            <div class="search-group"><label>아이템 이름</label><input type="text" id="iName" placeholder="아이템 이름을 입력하세요 (예: 태양, 대지)"></div>
        </div>
        <div class="search-row row-1">
            <div class="search-group">
                <label>아이템 종류</label>
                <select id="iType">
                    <option value="">전체보기</option>
                    <option value="무기">무기</option>
                    <option value="방어구">방어구</option>
                    <option value="장신구">장신구</option>
                    <option value="소모품">소모품</option>
                </select>
            </div>
        </div>
        <div class="search-row row-1">
            <div class="search-group"><label>효과 키워드</label><input type="text" id="iEffect" placeholder="특정 능력치 효과 (예: 공격력, 순발력)"></div>
        </div>
        <div class="search-actions">
            <button class="btn-reset" onclick="resetSearch()">초기화</button>
            <button class="btn-search" onclick="doSearch()" style="background:var(--item-color)">아이템 검색</button>
        </div>
    </div>

    <div id="resultArea"></div>
</div>

<script>
let currentTab = 'pet';

let petData = [];
let itemData = [];

async function loadData() {
    const area = document.getElementById('resultArea');

    try {
        area.innerHTML = `
            <div style="grid-column:1/-1; text-align:center; color:var(--text-sub); padding:40px;">
                페트 데이터를 불러오는 중입니다...
            </div>
        `;

        const petResponse = await fetch("./data/pets.json");
        petData = await petResponse.json();

        console.log("페트 데이터 로딩 완료:", petData.length);

        area.innerHTML = `
            <div style="grid-column:1/-1; text-align:center; color:var(--text-sub); padding:40px;">
                페트 데이터 ${petData.length}개 로딩 완료. 검색 조건을 입력해보세요.
            </div>
        `;
    } catch (error) {
        console.error("페트 데이터 로딩 실패:", error);

        area.innerHTML = `
            <div style="grid-column:1/-1; text-align:center; color:var(--accent); padding:40px;">
                페트 데이터를 불러오지 못했습니다.<br>
                data/pets.json 파일이 있는지 확인해주세요.
            </div>
        `;
    }
}

loadData();
    function switchTab(tab) {
        currentTab = tab;
        document.getElementById('petSearchPanel').style.display = tab === 'pet' ? 'block' : 'none';
        document.getElementById('itemSearchPanel').style.display = tab === 'item' ? 'block' : 'none';
        document.getElementById('petBtn').className = tab === 'pet' ? 'nav-btn active-pet' : 'nav-btn';
        document.getElementById('itemBtn').className = tab === 'item' ? 'nav-btn active-item' : 'nav-btn';
        document.getElementById('resultArea').innerHTML = "";
    }

    function resetSearch() {
        document.querySelectorAll('input').forEach(i => i.value = "");
        document.querySelectorAll('select').forEach(s => s.value = "");
        document.getElementById('resultArea').innerHTML = "";
    }

    function doSearch() {
        const area = document.getElementById('resultArea');
        area.innerHTML = "";

        if (currentTab === 'pet' && petData.length === 0) {
    area.innerHTML = `
        <div style="grid-column:1/-1; text-align:center; color:var(--text-sub); padding:40px;">
            아직 페트 데이터가 로딩되지 않았습니다.
        </div>
    `;
    return;
}

        if (currentTab === 'pet') {
            const filters = {
                name: document.getElementById('pName').value.toLowerCase(),
                지: parseInt(document.getElementById('eJi').value) || 0,
                수: parseInt(document.getElementById('eSu').value) || 0,
                화: parseInt(document.getElementById('eHwa').value) || 0,
                풍: parseInt(document.getElementById('ePung').value) || 0,
                atk: parseFloat(document.getElementById('minAtk').value) || 0,
                def: parseFloat(document.getElementById('minDef').value) || 0,
                agi: parseFloat(document.getElementById('minAgi').value) || 0,
                hp: parseFloat(document.getElementById('minHp').value) || 0,
                total: parseFloat(document.getElementById('minTotal').value) || 0
            };

            const filtered = petData
                .filter(p => {
                    return p.name.toLowerCase().includes(filters.name) &&
                           (p.elem?.지 || 0) >= filters.지 && (p.elem?.수 || 0) >= filters.수 &&
                           (p.elem?.화 || 0) >= filters.화 && (p.elem?.풍 || 0) >= filters.풍 &&
                           p.stats.atk >= filters.atk && p.stats.def >= filters.def && 
                           p.stats.agi >= filters.agi && p.stats.hp >= filters.hp &&
                           p.total >= filters.total;
                })
                .sort((a, b) => parseFloat(a.total) - parseFloat(b.total));

            filtered.forEach(p => {
                let elemHtml = '';
                for(const [k, v] of Object.entries(p.elem || {})) if(v > 0) elemHtml += `<span class="elem-badge bg-${k}">${k} ${v}</span>`;
                area.innerHTML += `
                    <div class="card" style="border-left: 5px solid var(--primary)">
                        <div class="total-badge">${p.total}</div>
                        <div style="font-size:1.2rem; font-weight:bold; color:var(--primary);">${p.emoji || '🐾'} ${p.name}</div>
                        <div style="font-size:0.75rem; color:var(--text-sub); margin-bottom:5px;">${p.sub}</div>
                        <div>${elemHtml}</div>
                        <div class="stat-section">
                            <div class="stat-row-label">📈 성장률</div>
                            <div class="stat-grid">
                                <div class="stat-val"><span class="stat-label">공</span><span class="stat-num">${p.stats.atk}</span></div>
                                <div class="stat-val"><span class="stat-label">방</span><span class="stat-num">${p.stats.def}</span></div>
                                <div class="stat-val"><span class="stat-label">순</span><span class="stat-num">${p.stats.agi}</span></div>
                                <div class="stat-val"><span class="stat-label">체</span><span class="stat-num">${p.stats.hp}</span></div>
                            </div>
                            <div class="stat-row-label">👶 초기치</div>
                            <div class="stat-grid">
                                <div class="stat-val"><span class="stat-label">공</span><span class="stat-num" style="color:#fbbf24">${p.init.atk}</span></div>
                                <div class="stat-val"><span class="stat-label">방</span><span class="stat-num" style="color:#fbbf24">${p.init.def}</span></div>
                                <div class="stat-val"><span class="stat-label">순</span><span class="stat-num" style="color:#fbbf24">${p.init.agi}</span></div>
                                <div class="stat-val"><span class="stat-label">체</span><span class="stat-num" style="color:#fbbf24">${p.init.hp}</span></div>
                            </div>
                        </div>
                    </div>`;
            });
        } else {
            // 아이템 검색 로직 - 수정 버전
            const iName = document.getElementById('iName').value.trim().toLowerCase();
            const iType = document.getElementById('iType').value;
            const iEffect = document.getElementById('iEffect').value.trim().toLowerCase();

            function safeText(value) {
                return String(value ?? '').toLowerCase();
            }

            function objectToSearchText(obj = {}) {
                const labelMap = {
                    atk: '공 공격 공격력',
                    def: '방 방어 방어력',
                    agi: '순 순발 순발력 민첩',
                    hp: '체 체력 hp'
                };

                return Object.entries(obj || {})
                    .map(([key, value]) => `${key} ${labelMap[key] || ''} ${value}`)
                    .join(' ');
            }

            function getItemType(item) {
                const name = item.name || '';
                const emoji = item.emoji || '';

                if (
                    /(창|도끼|활|장궁|부메랑|손톱|발톱|참다랑어)/.test(name) ||
                    ['🔱', '🪓', '🏹', '🪃', '🐾', '🐟'].includes(emoji)
                ) {
                    return '무기';
                }

                if (
                    /(갑옷|옷|투구|머리장식|장갑)/.test(name) ||
                    ['👕', '🪖', '👑', '🧤'].includes(emoji)
                ) {
                    return '방어구';
                }

                if (
                    /(반지|귀걸이|목걸이|펜던트|벨트)/.test(name) ||
                    ['💍', '👂', '📿', '🎗️'].includes(emoji)
                ) {
                    return '장신구';
                }

                return '소모품';
            }

            function getItemSearchText(item) {
                return [
                    item.name,
                    item.sub,
                    item.desc,
                    objectToSearchText(item.elem),
                    objectToSearchText(item.init),
                    objectToSearchText(item.stats)
                ].join(' ').toLowerCase();
            }

            function makeStatHtml(title, obj = {}) {
                const entries = Object.entries(obj || {})
                    .filter(([_, value]) => String(value) !== '0' && String(value).trim() !== '');

                if (entries.length === 0) return '';

                return `
                    <div style="margin-top:8px;">
                        <div style="font-size:0.75rem; color:var(--item-color); font-weight:bold; margin-bottom:4px;">${title}</div>
                        <div class="stat-grid">
                            ${entries.map(([key, value]) => `
                                <div class="stat-val">
                                    <span class="stat-label">${key}</span>
                                    <span class="stat-num">${value}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }

            const filteredItems = itemData.filter(item => {
                const type = getItemType(item);
                const searchText = getItemSearchText(item);

                const matchName = safeText(item.name).includes(iName);
                const matchType = iType === '' || type === iType;
                const matchEffect = iEffect === '' || searchText.includes(iEffect);

                return matchName && matchType && matchEffect;
            });

            if (filteredItems.length === 0) {
                area.innerHTML = `
                    <div style="grid-column:1/-1; text-align:center; color:var(--text-sub); padding:40px;">
                        검색 결과가 없습니다.
                    </div>
                `;
                return;
            }

            filteredItems.forEach(item => {
                const type = getItemType(item);

                let elemHtml = '';
                for (const [key, value] of Object.entries(item.elem || {})) {
                    if (value > 0) {
                        elemHtml += `<span class="elem-badge bg-${key}">${key} ${value}</span>`;
                    }
                }

                area.innerHTML += `
                    <div class="card" style="border-left: 5px solid var(--item-color)">
                        <div style="font-size:0.7rem; color:var(--item-color); font-weight:bold; margin-bottom:5px;">
                            ${type}
                        </div>

                        <div style="font-size:1.3rem; font-weight:bold; color:var(--item-color);">
                            ${item.emoji || '🎒'} ${item.name}
                        </div>

                        <div style="font-size:0.75rem; color:var(--text-sub); margin-top:4px;">
                            ${item.sub || ''}
                        </div>

                        <div style="margin-top:8px;">
                            ${elemHtml}
                        </div>

                        <div class="stat-section">
                            ${makeStatHtml('기본 능력치', item.init)}
                            ${makeStatHtml('추가 효과', item.stats)}

                            ${item.desc ? `
                                <div style="margin-top:10px; color:var(--text-sub); font-size:0.85rem;">
                                    ${item.desc}
                                </div>
                            ` : ''}
                        </div>
                    </div>
                `;
            });
        }
    }
</script>
</body>
</html>
