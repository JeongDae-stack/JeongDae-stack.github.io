<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스톤에이지 통합 도감</title>
    <style>
        :root {
            --bg-color: #0f172a; --card-bg: #1e293b; --primary: #38bdf8;
            --accent: #f43f5e; --text-main: #f1f5f9; --text-sub: #94a3b8;
            --item-color: #10b981; /* 아이템용 포인트 컬러 (녹색) */
        }

        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }

        /* 네비게이션 탭 */
        .nav-tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; }
        .nav-btn { 
            padding: 10px 25px; border-radius: 30px; border: 2px solid #334155; 
            background: transparent; color: var(--text-sub); cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        .nav-btn.active { background: var(--primary); color: #0f172a; border-color: var(--primary); }
        .nav-btn.item-active { background: var(--item-color); color: #0f172a; border-color: var(--item-color); }

        /* 검색창 */
        .search-box {
            display: flex; gap: 10px; background: #1e293b; padding: 15px; 
            border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); margin-bottom: 40px;
        }
        input#searchInput {
            flex: 1; padding: 12px; border-radius: 10px; border: 2px solid #334155; 
            background: #0f172a; color: white; outline: none;
        }

        /* 공통 카드 스타일 */
        #resultArea { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .card { 
            background: var(--card-bg); border-radius: 16px; padding: 20px; 
            border: 1px solid #334155; position: relative; animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 아이템 카드 전용 스타일 */
        .item-card { border-left: 5px solid var(--item-color); }
        .item-type { font-size: 0.8rem; color: var(--item-color); font-weight: bold; text-transform: uppercase; }
        .item-desc { font-size: 0.9rem; color: var(--text-sub); margin-top: 10px; background: #0f172a; padding: 10px; border-radius: 8px; }

        /* 펫 카드 전용 스타일 */
        .pet-card { border-left: 5px solid var(--primary); }
        .stat-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 10px; }
        .stat-val { font-size: 0.85rem; display: flex; justify-content: space-between; border-bottom: 1px solid #334155; }
    </style>
</head>
<body>

<div class="container">
    <div class="nav-tabs">
        <button id="petTab" class="nav-btn active" onclick="switchMode('pet')">🐾 페트 검색</button>
        <button id="itemTab" class="nav-btn" onclick="switchMode('item')">⚔️ 아이템 검색</button>
    </div>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="검색어를 입력하세요..." onkeypress="if(event.keyCode==13) search()">
        <button id="searchBtn" onclick="search()" style="padding: 12px 25px; border-radius: 10px; border:none; cursor:pointer; font-weight:bold; background: var(--primary);">검색</button>
    </div>

    <div id="resultArea"></div>
</div>

<script>
    let currentMode = 'pet';

    // 1. 데이터 소스 (기존 펫 데이터 유지 + 아이템 데이터 추가)
    const petData = [
        { "name": "(신)백호", "sub": "영웅의 길", "total": 5.008, "stats": {"atk":2.229, "def":1.335, "agi":1.443, "hp":10.243}, "init": {"atk":12, "def":7, "agi":7, "hp":56} },
        { "name": "SD언딘(진)", "sub": "페트진화", "total": 5.288, "stats": {"atk":2.429, "def":1.079, "agi":1.77, "hp":10.144}, "init": {"atk":14, "def":6, "agi":10, "hp":60} }
    ];

    const itemData = [
        { "name": "태양의 목걸이", "type": "장신구", "effect": "공격력 +20, 순발력 +10", "desc": "빛나는 태양의 기운이 담긴 목걸이" },
        { "name": "대지의 도끼", "type": "무기", "effect": "공격력 +50, 방어력 -10", "desc": "땅의 무게를 담아 파괴력이 강한 도끼" },
        { "name": "질풍의 갑옷", "type": "방어구", "effect": "방어력 +30, 순발력 +15", "desc": "바람처럼 가벼운 소재로 만든 갑옷" }
    ];

    // 2. 모드 전환 함수
    function switchMode(mode) {
        currentMode = mode;
        const pBtn = document.getElementById('petTab');
        const iBtn = document.getElementById('itemTab');
        const sBtn = document.getElementById('searchBtn');
        const input = document.getElementById('searchInput');

        if(mode === 'pet') {
            pBtn.className = 'nav-btn active';
            iBtn.className = 'nav-btn';
            sBtn.style.background = 'var(--primary)';
            input.placeholder = "페트 이름을 입력하세요...";
        } else {
            pBtn.className = 'nav-btn';
            iBtn.className = 'nav-btn item-active';
            sBtn.style.background = 'var(--item-color)';
            input.placeholder = "아이템 이름을 입력하세요...";
        }
        document.getElementById('resultArea').innerHTML = "";
    }

    // 3. 통합 검색 함수
    function search() {
        const query = document.getElementById('searchInput').value.trim();
        const area = document.getElementById('resultArea');
        area.innerHTML = "";
        if(!query) return;

        if(currentMode === 'pet') {
            const results = petData.filter(p => p.name.includes(query));
            results.forEach(p => area.innerHTML += createPetCard(p));
        } else {
            const results = itemData.filter(i => i.name.includes(query));
            results.forEach(i => area.innerHTML += createItemCard(i));
        }
    }

    function createPetCard(p) {
        return `
            <div class="card pet-card">
                <div style="font-weight:bold; color:var(--primary); font-size:1.2rem;">${p.name}</div>
                <div style="font-size:0.8rem; color:var(--text-sub);">${p.sub} | 성장률: ${p.total}</div>
                <div class="stat-grid">
                    <div class="stat-val"><span>공</span><b>${p.stats.atk}</b></div>
                    <div class="stat-val"><span>방</span><b>${p.stats.def}</b></div>
                    <div class="stat-val"><span>순</span><b>${p.stats.agi}</b></div>
                    <div class="stat-val"><span>체</span><b>${p.stats.hp}</b></div>
                </div>
            </div>`;
    }

    function createItemCard(i) {
        return `
            <div class="card item-card">
                <div class="item-type">${i.type}</div>
                <div style="font-weight:bold; color:var(--item-color); font-size:1.2rem; margin: 5px 0;">${i.name}</div>
                <div style="color:#fff; font-size:0.95rem;">✨ ${i.effect}</div>
                <div class="item-desc">${i.desc}</div>
            </div>`;
    }
</script>
</body>
</html>
